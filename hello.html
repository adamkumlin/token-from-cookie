<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Cookie Viewer</title>
</head>

<body>
  <div id="cookie-container">
    <input id="cookie-value-container" readonly type="text" />
    <div role="button" id="copy-button">Copy to clipboard</div>
  </div>
  <script src="popup.js"></script>

  <style>
    #cookie-container {
      width: 100%;
    }

    #copy-button {
      cursor: pointer;

    }
  </style>
</body>

</html>
